<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAFLIX - BRAFLIX | SUPREME LEADER BRAX</title>
    <style>
        /* CSS YA PAMOJA HAPA */
        body {
            background-color: #0f0f1d;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background-color: #000;
            padding: 10px 20px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .main-logo {
            height: 40px;
        }

        .search-container {
            flex-grow: 1;
            max-width: 500px;
            margin: 0 20px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            background: #1e1e30;
            color: white;
            outline: none;
        }

        .hero-banner {
            background: linear-gradient(180deg, #b30000 0%, #000000 100%);
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        main {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h2 {
            font-size: 1.5rem;
            margin: 0;
        }

        .see-all {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: transparent;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card p {
            margin-top: 10px;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
        }

        /* Sidebar Icons Placeholder */
        .sidebar {
            position: fixed;
            left: 15px;
            top: 100px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            color: #555;
            font-size: 1.2rem;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .search-container { width: 50%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>🏠</div>
        <div>🧭</div>
        <div>📁</div>
        <div>📅</div>
        <div>🧩</div>
        <div>⚙️</div>
    </div>

    <header>
        <div class="top-nav">
            <img src="BRAXFLIX.png" alt="BRAFLIX" class="main-logo">
            <div class="search-container">
                <input type="text" placeholder="Search or paste link">
            </div>
            <div style="font-size: 1.2rem;">👤</div>
        </div>
    </header>

    <div class="hero-banner">
        BRAFLIX BY SUPREME LEADER BRAX
    </div>

    <main>
        <section>
            <div class="section-header">
                <h2>Popular - Movie</h2>
                <a href="#" class="see-all">See All ></a>
            </div>
            <div class="movie-grid">
                <div class="card"><img src="war_machine.jpg"><p>War Machine</p></div>
                <div class="card"><img src="zootopia.jpg"><p>Zootopia 2</p></div>
                <div class="card"><img src="good_luck.jpg"><p>Good Luck, Have Fun, Don't Die</p></div>
                <div class="card"><img src="sinners.jpg"><p>Sinners</p></div>
                <div class="card"><img src="hamnet.jpg"><p>Hamnet</p></div>
                <div class="card"><img src="one_battle.jpg"><p>One Battle After Another</p></div>
                <div class="card"><img src="marty.jpg"><p>Marty Supreme</p></div>
            </div>
        </section>

        <section>
            <div class="section-header">
                <h2>Popular - Series</h2>
                <a href="#" class="see-all">See All ></a>
            </div>
            <div class="movie-grid">
                <div class="card"><img src="one_piece.jpg"><p>One Piece</p></div>
                <div class="card"><img src="the_pit.jpg"><p>The Pit</p></div>
                <div class="card"><img src="paradise.jpg"><p>Paradise</p></div>
            </div>
        </section>
    </main>

</body>
</html>
