<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>BRAFLIX | SUPREME LEADER BRAX</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        
        /* HEADER MPYA: BRAFLIX by SUPREME LEADER BRAX */
        #brax-header {
            background: linear-gradient(90deg, #000 0%, #E50914 50%, #000 100%);
            color: white;
            padding: 12px;
            text-align: center;
            font-family: 'Arial Black', sans-serif;
            font-size: 20px;
            letter-spacing: 5px;
            font-weight: bold;
            text-shadow: 2px 2px 10px #000;
            box-shadow: 0 5px 20px rgba(229, 9, 20, 0.6);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10000;
            text-transform: uppercase;
        }

        /* IFRAME YA ENGINE */
        iframe {
            width: 100%;
            height: calc(100% - 50px);
            border: none;
            margin-top: 50px;
            background-color: #000;
        }

        /* MASKING YA LOGO YA STREMIO */
        .mask-logo {
            position: fixed;
            top: 58px; 
            left: 12px;
            width: 45px;
            height: 45px;
            background-color: #000;
            z-index: 9999;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #E50914;
            box-shadow: 0 0 15px #E50914;
        }
        .mask-logo::after {
            content: "B";
            color: #E50914;
            font-weight: 900;
            font-size: 28px;
            font-family: 'Arial Black', sans-serif;
        }
    </style>
</head>
<body>

    <div id="brax-header">BRAFLIX by SUPREME LEADER BRAX</div>

</html>
