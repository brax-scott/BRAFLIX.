<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>BRAFLIX | SUPREME LEADER BRAX</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: 'Arial Black', sans-serif; }

        /* INTRO ANIMATION */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 20000;
            animation: fadeOut 1s ease-in 3.5s forwards;
        }

        #intro-logo {
            width: 300px; /* Logo kubwa wakati inaanza */
            opacity: 0;
            transform: scale(0.5);
            animation: netflixStyle 3s ease-out forwards;
        }

        @keyframes netflixStyle {
            0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* HEADER */
        #brax-header {
            background: #000;
            padding: 8px;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid #E50914;
            position: fixed;
            top: 0; width: 100%;
            z-index: 10000;
        }

        #header-logo {
            height: 35px; /* Logo ndogo kwenye header */
        }

        #brax-title {
            color: #fff; font-size: 14px; letter-spacing: 2px; margin-left: 15px; font-weight: bold;
        }

        iframe { width: 100%; height: calc(100% - 55px); border: none; margin-top: 55px; background-color: #000; }

        /* KUFUTA LOGO YA STREMIO */
        .mask-logo {
            position: fixed; top: 62px; left: 12px;
            width: 45px; height: 45px;
            background-color: #000; z-index: 9999;
            border-radius: 8px; border: 1px solid #E50914;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img src="logo.png" id="intro-logo" alt="BRAFLIX">
    </div>

    <div id="brax-header">
        <img src="logo.png" id="header-logo" alt="BRAFLIX">
        <div id="brax-title">BY SUPREME LEADER BRAX</div>
    </div>
    
    <div class="mask-logo"></div>

    <iframe src="https://web.stremio.com" id="stremio-engine" allowfullscreen></iframe>

</body>
</html>
