<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAFLIX | SUPREME LEADER BRAX</title>
    <style>
        body { background-color: #0d0d1a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { background: #000; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .logo-container img { height: 40px; border: 2px solid red; border-radius: 4px; padding: 2px; }
        .search-bar { flex-grow: 1; max-width: 500px; margin: 0 30px; position: relative; }
        .search-bar input { width: 100%; padding: 10px 20px; border-radius: 20px; border: none; background: #1e1e30; color: white; outline: none; }
        .red-banner { background: linear-gradient(to bottom, #a00, #000); text-align: center; padding: 12px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .sidebar { position: fixed; left: 15px; top: 120px; display: flex; flex-direction: column; gap: 25px; color: #666; font-size: 1.4rem; z-index: 10; }
        main { padding: 20px 20px 20px 80px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .see-all { color: #888; text-decoration: none; font-size: 0.9rem; }
        .grid { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .card { min-width: 160px; text-align: center; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: scale(1.08); }
        .card img { width: 100%; height: 240px; border-radius: 12px; object-fit: cover; box-shadow: 0 8px 20px rgba(0,0,0,0.6); background: #1a1a2e; }
        .card p { margin-top: 10px; font-size: 0.9rem; color: #ccc; font-weight: 500; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="color: #9333ea;">🏠</div><div>🧭</div><div>📁</div><div>📅</div><div>🧩</div><div>⚙️</div>
    </div>

    <header>
        <div class="logo-container">
            <img src="BRAXFLIX.png" alt="B">
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search or paste link">
        </div>
        <div style="display: flex; gap: 20px; font-size: 1.3rem; color: #555;">
            <span>🔳</span><span>👤</span>
        </div>
    </header>

    <div class="red-banner">BRAFLIX BY SUPREME LEADER BRAX</div>

    <main>
        <div class="section-header">
            <h2>Popular - Movie</h2>
            <a href="#" class="see-all">See All ></a>
        </div>
        <div class="grid">
            <div class="card"><img src="war_machine.jpg"><p>War Machine</p></div>
            <div class="card"><img src="zootopia.jpg"><p>Zootopia 2</p></div>
            <div class="card"><img src="good_luck.jpg"><p>Good Luck, Have Fun...</p></div>
            <div class="card"><img src="sinners.jpg"><p>Sinners</p></div>
            <div class="card"><img src="hamnet.jpg"><p>Hamnet</p></div>
            <div class="card"><img src="one_battle.jpg"><p>One Battle After Another</p></div>
        </div>

        <div class="section-header" style="margin-top: 40px;">
            <h2>Popular - Series</h2>
            <a href="#" class="see-all">See All ></a>
        </div>
        <div class="grid">
            <div class="card"><img src="one_piece.jpg"><p>One Piece</p></div>
            <div class="card"><img src="the_pit.jpg"><p>The Pit</p></div>
            <div class="card"><img src="paradise.jpg"><p>Paradise</p></div>
        </div>
    </main>

</body>
</html>
