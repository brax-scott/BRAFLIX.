<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>BRAXFLIX OS | SUPREME LEADER BRAX-SCOTT</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        
        /* HEADER YA BRAXFLIX - HII INAFUNIKA STREMIO */
        #brax-header {
            background: linear-gradient(90deg, #000 0%, #E50914 50%, #000 100%);
            color: white;
            padding: 12px;
            text-align: center;
            font-family: 'Arial Black', sans-serif;
            font-size: 22px;
            letter-spacing: 7px;
            font-weight: bold;
            text-shadow: 2px 2px 10px #000;
            box-shadow: 0 5px 20px rgba(229, 9, 20, 0.5);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10000;
        }

        /* IFRAME YA MOVIE - TUNAPACHIKA ENGINE NDANI */
        iframe {
            width: 100%;
            height: calc(100% - 50px);
            border: none;
            margin-top: 50px;
            background-color: #000;
        }

        /* MBINU YA KUFUTA LOGO YA STREMIO KWA NJIA YA "MASKING" */
        .mask-logo {
            position: fixed;
            top: 55px; /* Inafunika logo ya juu kushoto ya Stremio */
            left: 10px;
            width: 50px;
            height: 50px;
            background-color: #000;
            z-index: 9999;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #E50914;
        }
        .mask-logo::after {
            content: "B"; /* Herufi ya kwanza ya BRAXFLIX */
            color: #E50914;
            font-weight: bold;
            font-size: 30px;
        }
    </style>
</head>
<body>

    <div id="brax-header">BRAXFLIX BY BRAX-SCOTT</div>
    <div class="mask-logo"></div>

    <iframe src="https://web.stremio.com" id="stremio-engine" allowfullscreen></iframe>

</body>
</html>
