<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAFLIX | SUPREME LEADER BRAX</title>
    <style>
        /* RANGI ZA KIGAIDI: BLACK & RED */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: 'Arial Black', sans-serif; }

        /* INTRO ANIMATION (NETFLIX STYLE) */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 20000;
            animation: fadeOut 1s ease-in 3.5s forwards;
        }

        #intro-logo {
            width: 280px; /* Logo kubwa wakati inaanza */
            opacity: 0;
            transform: scale(0.6);
            animation: netflixStyle 3s ease-out forwards;
        }

        @keyframes netflixStyle {
            0% { transform: scale(0.6); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* HEADER YA BRAFLIX */
        #brax-header {
            background: #000;
            height: 55px;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid #E50914;
            position: fixed;
            top: 0; width: 100%;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.5);
        }

        .header-logo-img {
            height: 35px; /* Logo ndogo kwenye header */
            margin-right: 15px;
        }

        #brax-title {
            color: #fff; font-size: 14px; letter-spacing: 2px; font-weight: bold; text-transform: uppercase;
        }

        /* ENGINE YA MOVIE */
        iframe {
            width: 100%;
            height: calc(100% - 55px);
            border: none;
            margin-top: 55px;
            background-color: #000;
        }

        /* KUFUTA LOGO YA STREMIO (MASKING) */
        .mask-logo {
            position: fixed; top: 65px; left: 10px;
            width: 50px; height: 50px;
            background-color: #000; z-index: 9999;
            border-radius: 8px; border: 1px solid #E50914;
        }
    </style>
</head>
