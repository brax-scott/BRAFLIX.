<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAFLIX | SUPREME LEADER BRAX</title>
    <style>
        body { background-color: #0f0f1d; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { background-color: #000; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { height: 35px; border: 2px solid red; border-radius: 5px; padding: 2px; }
        .search-container { flex-grow: 1; max-width: 450px; margin: 0 20px; }
        .search-container input { width: 100%; padding: 10px 20px; border-radius: 20px; border: none; background: #1e1e30; color: white; outline: none; }
        .banner-red { background: linear-gradient(to bottom, #800, #000); text-align: center; padding: 12px; font-weight: bold; letter-spacing: 2px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .sidebar { position: fixed; left: 15px; top: 120px; display: flex; flex-direction: column; gap: 25px; color: #5b5b7b; font-size: 1.3rem; }
        main { padding: 20px 20px 20px 70px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-size: 1.4rem; margin: 0; color: #eee; }
        .see-all { color: #888; text-decoration: none; font-size: 0.9rem; }
        .movie-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; }
        .card { min-width: 155px; transition: transform 0.3s; cursor: pointer; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 230px; object-fit: cover; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .card p { text-align: center; margin-top: 10px; font-size: 0.85rem; color: #bbb; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="BRAXFLIX.png" alt="B">
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search or paste link">
        </div>
        <div style="display: flex; gap: 15px; font-size: 1.2rem; color: #5b5b7b;">
            <span>🔳</span><span>👤</span>
        </div>
    </header>

    <div class="banner-red">BRAFLIX BY SUPREME LEADER BRAX</div>

    <div class="sidebar">
        <div style="color: #8a2be2;">🏠</div><div>🧭</div><div>📁</div><div>📅</div><div>🧩</div><div>⚙️</div>
    </div>

    <main>
        <section>
            <div class="section-header">
                <h2>Popular - Movie</h2>
                <a href="#" class="see-all">See All ></a>
            </div>
            <div class="movie-grid">
                <div class="card"><img src="war_machine.jpg"><p>War Machine</p></div>
                <div class="card"><img src="zootopia.jpg"><p>Zootopia 2</p></div>
                <div class="card"><img src="good_luck.jpg"><p>Good Luck, Have Fun...</p></div>
                <div class="card"><img src="sinners.jpg"><p>Sinners</p></div>
                <div class="card"><img src="hamnet.jpg"><p>Hamnet</p></div>
                <div class="card"><img src="one_battle.jpg"><p>One Battle After Another</p></div>
                <div class="card"><img src="marty.jpg"><p>Marty Supreme</p></div>
            </div>
        </section>

        <section style="margin-top: 40px;">
            <div class="section-header">
                <h2>Popular - Series</h2>
                <a href="#" class="see-all">See All ></a>
            </div>
            <div class="movie-grid">
                <div class="card"><img src="one_piece.jpg"><p>One Piece</p></div>
                <div class="card"><img src="the_pit.jpg"><p>The Pit</p></div>
                <div class="card"><img src="paradise.jpg"><p>Paradise</p></div>
            </div>
        </section>
    </main>

</body>
</html>
